<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Passeios" />
<meta name="theme-color" content="#E7EFDF" />
<title>Passeios do dia</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #E7EFDF;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  button { font-family: inherit; }
  button:focus-visible {
    outline: 2px solid #1C4227;
    outline-offset: 2px;
  }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const DOGS = [
  { id: "amy", nome: "Amy", inicial: "A" },
  { id: "joey", nome: "Joey", inicial: "J" },
  { id: "lorelai", nome: "Lorelai", inicial: "L" },
  { id: "peralta", nome: "Peralta", inicial: "P" },
  { id: "fujao", nome: "Fujão", inicial: "F" },
  { id: "sheldon", nome: "Sheldon", inicial: "S" },
  { id: "raj", nome: "Raj", inicial: "R" },
];

// Sugestão de rodízio por dia da semana (0 = domingo ... 6 = sábado).
// Passeio 1 é sempre o Joey sozinho e o passeio 2 é sempre o Fujão com o Raj.
const SUGESTAO = {
  0: { joey: 1, fujao: 2, raj: 2, lorelai: 3, peralta: 3, amy: 4 },
  1: { joey: 1, fujao: 2, raj: 2, amy: 3, lorelai: 3, peralta: 4, sheldon: 4 },
  2: { joey: 1, fujao: 2, raj: 2, lorelai: 3, sheldon: 3, amy: 4 },
  3: { joey: 1, fujao: 2, raj: 2, lorelai: 3, peralta: 4, sheldon: 4 },
  4: { joey: 1, fujao: 2, raj: 2, lorelai: 3, peralta: 3, sheldon: 4 },
  5: { joey: 1, fujao: 2, raj: 2, lorelai: 3, amy: 4 },
  6: { joey: 1, fujao: 2, raj: 2, amy: 3, lorelai: 3, peralta: 4, sheldon: 4 },
};

const WALKS = [1, 2, 3, 4];

const C = {
  bg: "#E7EFDF",
  surface: "#FBFDF8",
  surfaceAlt: "#F1F6EB",
  deep: "#20392A",
  mid: "#4C7A54",
  strong: "#37613F",
  done: "#1C4227",
  plan: "#CBE0BE",
  planText: "#2C5137",
  line: "#C4D6BB",
  soft: "#8FA684",
  gold: "#B8892B",
};

function todayStr() {
  const d = new Date();
  const off = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - off).toISOString().slice(0, 10);
}

function labelData(d) {
  const dt = new Date(d + "T12:00:00");
  const s = dt.toLocaleDateString("pt-BR", {
    weekday: "long",
    day: "numeric",
    month: "long",
  });
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function shiftDay(d, delta) {
  const dt = new Date(d + "T12:00:00");
  dt.setDate(dt.getDate() + delta);
  const off = dt.getTimezoneOffset() * 60000;
  return new Date(dt.getTime() - off).toISOString().slice(0, 10);
}

function normalizar(dados, dow) {
  if (dados === null) {
    return { assign: { ...SUGESTAO[dow] }, feitos: {} };
  }
  if (dados && typeof dados === "object" && ("assign" in dados || "feitos" in dados)) {
    return { assign: dados.assign || {}, feitos: dados.feitos || {} };
  }
  return { assign: dados || {}, feitos: {} };
}

function carregarNorm(d) {
  const dow = new Date(d + "T12:00:00").getDay();
  let salvo = null;
  try {
    const raw = localStorage.getItem("passeios:" + d);
    if (raw) salvo = JSON.parse(raw);
  } catch (e) {
    salvo = null;
  }
  return normalizar(salvo, dow);
}

function CalendarioPasseios() {
  const [date, setDate] = useState(todayStr);
  const [assign, setAssign] = useState(() => carregarNorm(todayStr()).assign);
  const [feitos, setFeitos] = useState(() => carregarNorm(todayStr()).feitos);
  const [active, setActive] = useState(1);

  useEffect(() => {
    const dados = carregarNorm(date);
    setAssign(dados.assign);
    setFeitos(dados.feitos);
  }, [date]);

  function persist(nextAssign, nextFeitos) {
    setAssign(nextAssign);
    setFeitos(nextFeitos);
    try {
      localStorage.setItem(
        "passeios:" + date,
        JSON.stringify({ assign: nextAssign, feitos: nextFeitos })
      );
    } catch (e) {
      // Mantém em memória mesmo se a gravação falhar.
    }
  }

  function toggleCao(dogId) {
    const next = { ...assign };
    if (next[dogId] === active) delete next[dogId];
    else next[dogId] = active;
    persist(next, feitos);
  }

  function toggleFeito(w) {
    const next = { ...feitos };
    if (next[w]) delete next[w];
    else next[w] = true;
    persist(assign, next);
  }

  function restaurarSugestao() {
    const dow = new Date(date + "T12:00:00").getDay();
    persist({ ...SUGESTAO[dow] }, {});
  }

  function limpar() {
    persist({}, {});
  }

  function estadoCao(dogId) {
    const p = assign[dogId];
    if (!p) return { estado: "fora", passeio: null };
    if (feitos[p]) return { estado: "feito", passeio: p };
    return { estado: "planejado", passeio: p };
  }

  const feitosCaes = DOGS.filter((d) => estadoCao(d.id).estado === "feito");
  const faltamCaes = DOGS.filter((d) => estadoCao(d.id).estado === "planejado");
  const foraCaes = DOGS.filter((d) => estadoCao(d.id).estado === "fora");
  const noPasseioAtivo = DOGS.filter((d) => assign[d.id] === active);
  const ativoFeito = Boolean(feitos[active]);
  const ehHoje = date === todayStr();

  return (
    <div
      style={{
        minHeight: "100vh",
        background: C.bg,
        color: C.deep,
        fontFamily:
          "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
        paddingTop: "max(20px, env(safe-area-inset-top))",
        paddingBottom: "max(48px, env(safe-area-inset-bottom))",
        paddingLeft: "max(16px, env(safe-area-inset-left))",
        paddingRight: "max(16px, env(safe-area-inset-right))",
      }}
    >
      <div style={{ maxWidth: 560, margin: "0 auto" }}>
        <header style={{ marginBottom: 20 }}>
          <h1
            style={{
              fontFamily: "Georgia, 'Times New Roman', serif",
              fontSize: 30,
              fontWeight: 700,
              letterSpacing: "-0.01em",
              margin: 0,
              color: C.deep,
            }}
          >
            Passeios do dia
          </h1>
          <p style={{ margin: "6px 0 0", fontSize: 14.5, color: C.mid }}>
            A sugestão já vem pronta. Marque cada passeio como feito e acompanhe
            quem falta e quem ficou de fora.
          </p>
        </header>

        <div
          style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            gap: 10,
            background: C.surface,
            border: "1px solid " + C.line,
            borderRadius: 14,
            padding: "10px 12px",
            marginBottom: 18,
          }}
        >
          <button
            onClick={() => setDate(shiftDay(date, -1))}
            aria-label="Dia anterior"
            style={setaEstilo}
          >
            &#8249;
          </button>
          <div style={{ textAlign: "center", flex: 1 }}>
            <div
              style={{
                fontFamily: "Georgia, serif",
                fontSize: 17,
                fontWeight: 700,
              }}
            >
              {labelData(date)}
            </div>
            {!ehHoje && (
              <button
                onClick={() => setDate(todayStr())}
                style={{
                  marginTop: 3,
                  background: "none",
                  border: "none",
                  color: C.gold,
                  fontSize: 12.5,
                  fontWeight: 600,
                  cursor: "pointer",
                }}
              >
                Voltar para hoje
              </button>
            )}
          </div>
          <button
            onClick={() => setDate(shiftDay(date, 1))}
            aria-label="Próximo dia"
            style={setaEstilo}
          >
            &#8250;
          </button>
        </div>

        <section
          style={{
            background: C.surface,
            border: "1px solid " + C.line,
            borderRadius: 16,
            padding: "16px 14px",
            marginBottom: 18,
          }}
        >
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "baseline",
              marginBottom: 12,
            }}
          >
            <span
              style={{
                fontSize: 12,
                fontWeight: 700,
                letterSpacing: "0.08em",
                textTransform: "uppercase",
                color: C.soft,
              }}
            >
              Panorama
            </span>
            <span style={{ fontSize: 13, color: C.mid }}>
              {feitosCaes.length} feitos, {faltamCaes.length} faltam,{" "}
              {foraCaes.length} de fora
            </span>
          </div>

          <div
            style={{
              display: "grid",
              gridTemplateColumns: "repeat(7, 1fr)",
              gap: 6,
            }}
          >
            {DOGS.map((d) => {
              const { estado, passeio } = estadoCao(d.id);
              const feito = estado === "feito";
              const planejado = estado === "planejado";
              const bg = feito ? C.done : planejado ? C.plan : C.surfaceAlt;
              const cor = feito ? "#fff" : planejado ? C.planText : C.soft;
              const borda = feito
                ? "1px solid " + C.done
                : planejado
                ? "1px solid " + C.mid
                : "1px dashed " + C.line;
              return (
                <div
                  key={d.id}
                  style={{ textAlign: "center", minWidth: 0 }}
                  title={
                    feito
                      ? d.nome + " passeou no passeio " + passeio
                      : planejado
                      ? d.nome + " ainda vai no passeio " + passeio
                      : d.nome + " ficou de fora hoje"
                  }
                >
                  <div
                    style={{
                      position: "relative",
                      width: "100%",
                      aspectRatio: "1 / 1",
                      borderRadius: "50%",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontFamily: "Georgia, serif",
                      fontSize: 18,
                      fontWeight: 700,
                      background: bg,
                      color: cor,
                      border: borda,
                      transition:
                        "background 180ms ease, color 180ms ease, border-color 180ms ease",
                    }}
                  >
                    {d.inicial}
                    {passeio && (
                      <span
                        style={{
                          position: "absolute",
                          bottom: -3,
                          right: -3,
                          width: 17,
                          height: 17,
                          borderRadius: "50%",
                          background: C.gold,
                          color: "#fff",
                          fontFamily: "-apple-system, sans-serif",
                          fontSize: 10.5,
                          fontWeight: 700,
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                          border: "2px solid " + C.surface,
                        }}
                      >
                        {passeio}
                      </span>
                    )}
                  </div>
                  <div
                    style={{
                      marginTop: 5,
                      fontSize: 10.5,
                      color: estado === "fora" ? C.soft : C.deep,
                      overflow: "hidden",
                      textOverflow: "ellipsis",
                      whiteSpace: "nowrap",
                    }}
                  >
                    {d.nome}
                  </div>
                </div>
              );
            })}
          </div>

          <div
            style={{
              display: "flex",
              flexWrap: "wrap",
              gap: 14,
              marginTop: 14,
              fontSize: 12,
              color: C.mid,
            }}
          >
            <Legenda cor={C.done} texto="Feito" />
            <Legenda cor={C.plan} borda={C.mid} texto="Falta" />
            <Legenda cor={C.surfaceAlt} borda={C.line} tracejado texto="De fora" />
          </div>

          {faltamCaes.length > 0 && (
            <Bloco
              titulo="Ainda falta passear"
              corTitulo={C.strong}
              caes={faltamCaes}
            />
          )}
          {foraCaes.length > 0 && (
            <Bloco
              titulo="Ficaram de fora do dia"
              corTitulo={C.gold}
              caes={foraCaes}
            />
          )}
          {faltamCaes.length === 0 && foraCaes.length === 0 && (
            <p style={{ margin: "14px 0 0", fontSize: 13, color: C.strong }}>
              Todos os passeios do dia estão feitos.
            </p>
          )}
        </section>

        <div
          style={{
            display: "grid",
            gridTemplateColumns: "repeat(4, 1fr)",
            gap: 8,
            marginBottom: 14,
          }}
        >
          {WALKS.map((w) => {
            const ativo = w === active;
            const qtd = DOGS.filter((d) => assign[d.id] === w).length;
            const wFeito = Boolean(feitos[w]);
            return (
              <button
                key={w}
                onClick={() => setActive(w)}
                aria-pressed={ativo}
                style={{
                  border: "1px solid " + (ativo ? C.strong : C.line),
                  background: ativo ? C.strong : C.surface,
                  color: ativo ? "#fff" : C.deep,
                  borderRadius: 12,
                  padding: "10px 4px",
                  cursor: "pointer",
                  transition: "all 140ms ease",
                }}
              >
                <div style={{ fontSize: 12.5, fontWeight: 600 }}>Passeio</div>
                <div
                  style={{
                    fontFamily: "Georgia, serif",
                    fontSize: 22,
                    fontWeight: 700,
                    lineHeight: 1.1,
                  }}
                >
                  {w}
                </div>
                <div
                  style={{
                    fontSize: 11,
                    fontWeight: wFeito ? 700 : 400,
                    color: wFeito
                      ? ativo
                        ? "#fff"
                        : C.strong
                      : ativo
                      ? "rgba(255,255,255,0.85)"
                      : C.soft,
                  }}
                >
                  {wFeito
                    ? "feito"
                    : qtd === 0
                    ? "vazio"
                    : qtd === 1
                    ? "1 cão"
                    : qtd + " cães"}
                </div>
              </button>
            );
          })}
        </div>

        <section
          style={{
            background: C.surface,
            border: "1px solid " + C.line,
            borderRadius: 16,
            padding: "16px 14px",
            marginBottom: 14,
          }}
        >
          <p style={{ margin: "0 0 12px", fontSize: 14, color: C.mid }}>
            Toque no cão para pôr ou tirar do passeio {active}.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {DOGS.map((d) => {
              const passeio = assign[d.id];
              const aqui = passeio === active;
              const emOutro = passeio && passeio !== active;
              return (
                <button
                  key={d.id}
                  onClick={() => toggleCao(d.id)}
                  aria-pressed={aqui}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    width: "100%",
                    textAlign: "left",
                    border: "1px solid " + (aqui ? C.strong : C.line),
                    background: aqui ? C.mid : emOutro ? C.surfaceAlt : C.surface,
                    color: aqui ? "#fff" : C.deep,
                    borderRadius: 12,
                    padding: "11px 13px",
                    cursor: "pointer",
                    transition: "all 140ms ease",
                  }}
                >
                  <span
                    style={{
                      width: 34,
                      height: 34,
                      flexShrink: 0,
                      borderRadius: "50%",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontFamily: "Georgia, serif",
                      fontWeight: 700,
                      fontSize: 16,
                      background: aqui ? "rgba(255,255,255,0.2)" : C.surfaceAlt,
                      color: aqui ? "#fff" : C.mid,
                      border: aqui ? "none" : "1px solid " + C.line,
                    }}
                  >
                    {d.inicial}
                  </span>
                  <span style={{ flex: 1, fontSize: 16, fontWeight: 600 }}>
                    {d.nome}
                  </span>
                  {aqui && (
                    <span style={{ fontSize: 18, fontWeight: 700 }}>&#10003;</span>
                  )}
                  {emOutro && (
                    <span style={{ fontSize: 12.5, color: C.soft }}>
                      no passeio {passeio}
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          <div style={{ marginTop: 14 }}>
            {noPasseioAtivo.length === 0 ? (
              <p style={{ margin: 0, fontSize: 13, color: C.soft }}>
                Nenhum cão neste passeio ainda.
              </p>
            ) : ativoFeito ? (
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  gap: 10,
                  background: C.done,
                  borderRadius: 12,
                  padding: "12px 14px",
                }}
              >
                <span style={{ color: "#fff", fontSize: 14.5, fontWeight: 600 }}>
                  Passeio {active} concluído
                </span>
                <button
                  onClick={() => toggleFeito(active)}
                  style={{
                    background: "rgba(255,255,255,0.16)",
                    color: "#fff",
                    border: "1px solid rgba(255,255,255,0.4)",
                    borderRadius: 9,
                    padding: "7px 14px",
                    fontSize: 13.5,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  Desfazer
                </button>
              </div>
            ) : (
              <button
                onClick={() => toggleFeito(active)}
                style={{
                  width: "100%",
                  background: C.strong,
                  color: "#fff",
                  border: "none",
                  borderRadius: 12,
                  padding: "13px",
                  fontSize: 15,
                  fontWeight: 600,
                  cursor: "pointer",
                }}
              >
                Marcar passeio {active} como feito
              </button>
            )}
          </div>

          <div
            style={{
              marginTop: 14,
              paddingTop: 12,
              borderTop: "1px solid " + C.line,
              display: "flex",
              flexWrap: "wrap",
              alignItems: "center",
              gap: 8,
              fontSize: 13.5,
            }}
          >
            <span style={{ fontWeight: 700, color: C.gold }}>De fora hoje:</span>
            {foraCaes.length === 0 ? (
              <span style={{ color: C.mid }}>ninguém</span>
            ) : (
              foraCaes.map((d) => (
                <span
                  key={d.id}
                  style={{
                    color: C.deep,
                    background: C.surfaceAlt,
                    border: "1px solid " + C.line,
                    borderRadius: 999,
                    padding: "3px 11px",
                  }}
                >
                  {d.nome}
                </span>
              ))
            )}
          </div>
        </section>

        <div style={{ display: "flex", gap: 10 }}>
          <button
            onClick={restaurarSugestao}
            style={{
              flex: 1,
              background: C.deep,
              color: "#fff",
              border: "none",
              borderRadius: 12,
              padding: "13px",
              fontSize: 14.5,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            Restaurar sugestão do dia
          </button>
          <button
            onClick={limpar}
            style={{
              background: C.surface,
              color: C.mid,
              border: "1px solid " + C.line,
              borderRadius: 12,
              padding: "13px 18px",
              fontSize: 14.5,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            Limpar o dia
          </button>
        </div>

        <p
          style={{
            margin: "18px 2px 0",
            fontSize: 12,
            color: C.soft,
            lineHeight: 1.5,
          }}
        >
          A sugestão já vem aplicada conforme o rodízio combinado: passeio 1 é o
          Joey sozinho, passeio 2 é o Fujão com o Raj e os passeios 3 e 4 variam
          conforme o dia da semana. Ao marcar um passeio como feito, as fichas do
          panorama ficam verde escuro. Quem ainda não passeou fica em verde claro
          e quem folga no dia fica de fora. Seus registros ficam salvos neste
          aparelho.
        </p>
      </div>
    </div>
  );
}

function Legenda({ cor, borda, tracejado, texto }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
      <span
        style={{
          width: 14,
          height: 14,
          borderRadius: "50%",
          background: cor,
          border: borda
            ? (tracejado ? "1px dashed " : "1px solid ") + borda
            : "none",
        }}
      />
      {texto}
    </span>
  );
}

function Bloco({ titulo, corTitulo, caes }) {
  return (
    <div
      style={{
        marginTop: 14,
        padding: "11px 12px",
        background: C.surfaceAlt,
        border: "1px dashed " + C.line,
        borderRadius: 12,
      }}
    >
      <div
        style={{
          fontSize: 11.5,
          fontWeight: 700,
          letterSpacing: "0.06em",
          textTransform: "uppercase",
          color: corTitulo,
          marginBottom: 8,
        }}
      >
        {titulo}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {caes.map((d) => (
          <span
            key={d.id}
            style={{
              display: "inline-flex",
              alignItems: "center",
              gap: 7,
              fontSize: 13.5,
              color: C.deep,
              background: C.surface,
              border: "1px solid " + C.line,
              borderRadius: 999,
              padding: "4px 12px 4px 5px",
            }}
          >
            <span
              style={{
                width: 22,
                height: 22,
                borderRadius: "50%",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                background: C.surfaceAlt,
                border: "1px solid " + C.line,
                fontFamily: "Georgia, serif",
                fontSize: 12,
                fontWeight: 700,
                color: C.soft,
              }}
            >
              {d.inicial}
            </span>
            {d.nome}
          </span>
        ))}
      </div>
    </div>
  );
}

const setaEstilo = {
  width: 40,
  height: 40,
  flexShrink: 0,
  borderRadius: 10,
  border: "1px solid " + C.line,
  background: C.surfaceAlt,
  color: C.strong,
  fontSize: 22,
  lineHeight: 1,
  cursor: "pointer",
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CalendarioPasseios />);
</script>
</body>
</html>
